
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BI Pro - Analytics Mobile</title>
    
    <!-- Bibliotecas Externas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons (Substituídos por SVGs para garantir funcionamento offline/PWA) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .chart-container { position: relative; height: 60vh; width: 100%; }
        @media (min-width: 768px) { .chart-container { height: 70vh; } }
        /* Esconder scrollbars mas manter funcionalidade */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Cores Vibrantes para os Gráficos
        const COLORS = [
            '#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', 
            '#06b6d4', '#ec4899', '#84cc16', '#3b82f6', '#f97316'
        ];

        function App() {
            const [data, setData] = useState([]);
            const [columns, setColumns] = useState([]);
            const [config, setConfig] = useState({ xAxis: '', yAxis: '', agg: 'sum', type: 'bar' });
            const [filters, setFilters] = useState([]);
            const [modal, setModal] = useState({ open: false, step: 1, field: null });
            const [tempFilters, setTempFilters] = useState([]);
            const [drillDown, setDrillDown] = useState(null);
            const [loading, setLoading] = useState(false);

            const chartRef = useRef(null);
            const canvasRef = useRef(null);

            // Importação de Ficheiro
            const onUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    if (json.length > 0) {
                        const cols = Object.keys(json[0]);
                        setData(json);
                        setColumns(cols);
                        setConfig({ 
                            xAxis: cols[0], 
                            yAxis: cols.find(c => typeof json[0][c] === 'number') || cols[0],
                            agg: 'sum',
                            type: 'bar'
                        });
                    }
                    setLoading(false);
                };
                reader.readAsBinaryString(file);
            };

            // Lógica de Processamento
            const getProcessed = () => {
                const filtered = data.filter(row => 
                    filters.every(f => f.vals.length === 0 || f.vals.includes(String(row[f.field])))
                );
                
                const groups = {};
                filtered.forEach(row => {
                    const k = String(row[config.xAxis]) || 'N/A';
                    const v = parseFloat(row[config.yAxis]) || 0;
                    if (!groups[k]) groups[k] = { val: 0, count: 0, rows: [] };
                    groups[k].val += v;
                    groups[k].count++;
                    groups[k].rows.push(row);
                });

                return Object.keys(groups).map((k, i) => ({
                    label: k,
                    value: config.agg === 'sum' ? groups[k].val : (config.agg === 'avg' ? groups[k].val / groups[k].count : groups[k].count),
                    color: COLORS[i % COLORS.length],
                    rows: groups[k].rows
                }));
            };

            // Atualização do Gráfico
            useEffect(() => {
                if (data.length === 0 || !canvasRef.current) return;
                const processed = getProcessed();
                if (chartRef.current) chartRef.current.destroy();

                chartRef.current = new Chart(canvasRef.current, {
                    type: config.type,
                    data: {
                        labels: processed.map(p => p.label),
                        datasets: [{
                            data: processed.map(p => p.value),
                            backgroundColor: processed.map(p => p.color),
                            borderRadius: config.type === 'bar' ? 8 : 0,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        onClick: (e, el) => {
                            if (el.length > 0) setDrillDown(processed[el[0].index]);
                        },
                        plugins: { legend: { display: config.type !== 'bar' } }
                    }
                });
            }, [data, config, filters]);

            // Exportação e Partilha
            const handleShare = async (item) => {
                const ws = XLSX.utils.json_to_sheet(item.rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Dados");
                const buf = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
                const file = new File([buf], `BI_${item.label}.xlsx`, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try { await navigator.share({ files: [file], title: 'Exportação BI' }); }
                    catch { triggerDownload(file); }
                } else {
                    triggerDownload(file);
                }
            };

            const triggerDownload = (file) => {
                const url = URL.createObjectURL(file);
                const a = document.createElement('a');
                a.href = url; a.download = file.name; a.click();
            };

            return (
                <div className="max-w-4xl mx-auto min-h-screen flex flex-col">
                    {/* Top Bar */}
                    <header className="bg-white p-4 flex justify-between items-center shadow-sm border-b">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black">BI</div>
                            <h1 className="font-extrabold text-lg tracking-tight">PRO Mobile</h1>
                        </div>
                        <label className="bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-bold cursor-pointer active:scale-95 transition-transform">
                            Carregar Excel
                            <input type="file" className="hidden" accept=".xlsx,.csv" onChange={onUpload} />
                        </label>
                    </header>

                    {data.length === 0 ? (
                        <div className="flex-1 flex flex-col items-center justify-center p-10 text-center opacity-40">
                            <div className="w-20 h-20 bg-gray-200 rounded-full mb-4"></div>
                            <p className="font-bold uppercase tracking-widest text-xs">Importe dados para começar</p>
                        </div>
                    ) : (
                        <div className="flex-1 p-4 space-y-4">
                            {/* Controlos Dinâmicos */}
                            <div className="grid grid-cols-2 gap-3 bg-white p-4 rounded-2xl shadow-sm border">
                                <div className="space-y-1">
                                    <span className="text-[10px] font-black text-gray-400 uppercase">Dimensão (X)</span>
                                    <select value={config.xAxis} onChange={e => setConfig({...config, xAxis: e.target.value})} className="w-full bg-gray-50 p-2 rounded-lg text-sm font-bold border-0">
                                        {columns.map(c => <option key={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[10px] font-black text-gray-400 uppercase">Cálculo</span>
                                    <select value={config.agg} onChange={e => setConfig({...config, agg: e.target.value})} className="w-full bg-gray-50 p-2 rounded-lg text-sm font-bold border-0">
                                        <option value="sum">Soma</option>
                                        <option value="avg">Média</option>
                                        <option value="count">Contagem</option>
                                    </select>
                                </div>
                                <div className="col-span-2">
                                    <button onClick={() => setModal({open: true, step: 1, field: null})} className="w-full py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                        Filtros Avançados
                                    </button>
                                </div>
                            </div>

                            {/* Tags de Filtro */}
                            <div className="flex flex-wrap gap-2">
                                {filters.map((f, idx) => (
                                    <div key={idx} className="bg-white border px-2 py-1 rounded-md flex items-center gap-2 shadow-sm">
                                        <span className="text-[10px] font-bold text-gray-400 uppercase">{f.field}:</span>
                                        <span className="text-[10px] font-bold text-indigo-600">{f.vals.length} itens</span>
                                        <button onClick={() => setFilters(filters.filter((_, i) => i !== idx))} className="text-gray-300">×</button>
                                    </div>
                                ))}
                            </div>

                            {/* Gráfico */}
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border chart-container">
                                <div className="absolute top-4 right-6 flex gap-2 z-10">
                                    {['bar', 'pie', 'line'].map(t => (
                                        <button key={t} onClick={() => setConfig({...config, type: t})} className={`px-2 py-1 rounded-md text-[9px] font-black uppercase ${config.type === t ? 'bg-indigo-600 text-white' : 'bg-gray-100'}`}>{t}</button>
                                    ))}
                                </div>
                                <canvas ref={canvasRef}></canvas>
                            </div>
                        </div>
                    )}

                    {/* Modal Filtro */}
                    {modal.open && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-[2rem] sm:rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-lg">{modal.step === 1 ? 'Escolha o Campo' : `Valores de ${modal.field}`}</h3>
                                    <button onClick={() => setModal({open: false})} className="p-2 bg-gray-100 rounded-full">×</button>
                                </div>
                                
                                <div className="max-h-[50vh] overflow-y-auto space-y-2 pr-2">
                                    {modal.step === 1 ? columns.map(c => (
                                        <button key={c} onClick={() => { setModal({open: true, step: 2, field: c}); setTempFilters([]); }} className="w-full text-left p-4 bg-gray-50 rounded-xl font-bold hover:bg-indigo-50 transition-colors flex justify-between">
                                            {c} <span>→</span>
                                        </button>
                                    )) : [...new Set(data.map(d => String(d[modal.field])))].sort().map(v => (
                                        <button key={v} onClick={() => tempFilters.includes(v) ? setTempFilters(tempFilters.filter(x => x !== v)) : setTempFilters([...tempFilters, v])} className={`w-full text-left p-4 rounded-xl font-bold transition-all ${tempFilters.includes(v) ? 'bg-indigo-600 text-white shadow-lg' : 'bg-gray-50 text-gray-600'}`}>
                                            {v || "(Vazio)"}
                                        </button>
                                    ))}
                                </div>

                                {modal.step === 2 && (
                                    <div className="mt-6 flex gap-3">
                                        <button onClick={() => setModal({open: true, step: 1, field: null})} className="flex-1 py-4 bg-gray-100 rounded-2xl font-bold">Voltar</button>
                                        <button onClick={() => { 
                                            setFilters([...filters.filter(f => f.field !== modal.field), { field: modal.field, vals: tempFilters }]);
                                            setModal({open: false});
                                        }} className="flex-2 bg-indigo-600 text-white py-4 px-8 rounded-2xl font-bold shadow-lg shadow-indigo-100">Aplicar</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Drill Down */}
                    {drillDown && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-3xl overflow-hidden flex flex-col max-h-[80vh]">
                                <div className="p-6 bg-gray-900 text-white flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-black uppercase text-gray-500">Recorte de Dados</p>
                                        <h4 className="font-black text-xl">{drillDown.label}</h4>
                                    </div>
                                    <button onClick={() => setDrillDown(null)} className="p-2 bg-white/10 rounded-full">×</button>
                                </div>
                                <div className="flex-1 overflow-auto p-4 bg-gray-50">
                                    <table className="w-full text-[10px] border-collapse">
                                        <thead className="bg-white sticky top-0">
                                            <tr>{columns.map(c => <th key={c} className="p-2 border-b text-left text-gray-400 uppercase">{c}</th>)}</tr>
                                        </thead>
                                        <tbody>
                                            {drillDown.rows.slice(0, 10).map((r, i) => (
                                                <tr key={i}>{columns.map(c => <td key={c} className="p-2 border-b text-gray-600">{String(r[c])}</td>)}</tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {drillDown.rows.length > 10 && <p className="text-center py-2 text-[9px] text-gray-400">Mais {drillDown.rows.length - 10} linhas...</p>}
                                </div>
                                <div className="p-6 border-t bg-white">
                                    <button onClick={() => handleShare(drillDown)} className="w-full py-4 bg-green-600 text-white rounded-2xl font-black shadow-xl shadow-green-100 flex items-center justify-center gap-3">
                                        PARTILHAR EXCEL (WHATSAPP)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-4 font-black text-indigo-600 text-xs tracking-widest uppercase">A processar...</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
