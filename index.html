<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BI Mapa - Analytics Sidebar</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
            background-color: #F8FAFC;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .chart-container { position: relative; height: 100%; width: 100%; }
        ::-webkit-scrollbar { display: none; }
        
        /* Sidebar Transitions */
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #root:empty { display: none; }
        
        select { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); 
            background-position: right 0.5rem center; 
            background-repeat: no-repeat; 
            background-size: 1.5em 1.5em; 
            padding-right: 2.5rem; 
            -webkit-appearance: none; 
            appearance: none; 
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Registrar o plugin de datalabels
        Chart.register(ChartDataLabels);

        const COLORS = [
            '#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', 
            '#06b6d4', '#ec4899', '#84cc16', '#3b82f6', '#f97316'
        ];

        function App() {
            const [data, setData] = useState([]);
            const [columns, setColumns] = useState([]);
            const [config, setConfig] = useState({ xAxis: '', yAxis: '', agg: 'sum', type: 'bar' });
            const [filters, setFilters] = useState([]);
            const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 1024);
            const [modal, setModal] = useState({ open: false, step: 1, field: null });
            const [tempFilters, setTempFilters] = useState([]);
            const [drillDown, setDrillDown] = useState(null);
            const [loading, setLoading] = useState(false);

            const chartRef = useRef(null);
            const canvasRef = useRef(null);

            const onUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        if (json.length > 0) {
                            const cols = Object.keys(json[0]);
                            setData(json);
                            setColumns(cols);
                            const firstNum = cols.find(c => typeof json[0][c] === 'number') || cols[0];
                            setConfig({ xAxis: cols[0], yAxis: firstNum, agg: 'sum', type: 'bar' });
                        }
                    } catch (err) { alert("Erro ao ler ficheiro."); }
                    setLoading(false);
                };
                reader.readAsBinaryString(file);
            };

            const getProcessed = () => {
                if (data.length === 0) return [];
                const filtered = data.filter(row => 
                    filters.every(f => !f.vals || f.vals.length === 0 || f.vals.includes(String(row[f.field])))
                );
                const groups = {};
                filtered.forEach(row => {
                    const k = String(row[config.xAxis] ?? 'N/A');
                    const v = typeof row[config.yAxis] === 'number' ? row[config.yAxis] : parseFloat(row[config.yAxis]) || 0;
                    if (!groups[k]) groups[k] = { val: 0, count: 0, rows: [] };
                    groups[k].val += v;
                    groups[k].count++;
                    groups[k].rows.push(row);
                });
                return Object.keys(groups).map((k, i) => ({
                    label: k,
                    value: config.agg === 'sum' ? groups[k].val : (config.agg === 'avg' ? groups[k].val / groups[k].count : groups[k].count),
                    color: COLORS[i % COLORS.length],
                    rows: groups[k].rows
                }));
            };

            useEffect(() => {
                if (data.length === 0 || !canvasRef.current) return;
                const processed = getProcessed();
                if (chartRef.current) chartRef.current.destroy();

                chartRef.current = new Chart(canvasRef.current, {
                    type: config.type,
                    data: {
                        labels: processed.map(p => p.label),
                        datasets: [{
                            label: config.yAxis,
                            data: processed.map(p => p.value),
                            backgroundColor: processed.map(p => p.color),
                            borderRadius: config.type === 'bar' ? 12 : 0,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        onClick: (e, el) => { if (el.length > 0) setDrillDown(processed[el[0].index]); },
                        plugins: {
                            legend: { display: config.type === 'pie', position: 'bottom' },
                            datalabels: {
                                color: (ctx) => config.type === 'bar' ? '#64748b' : '#fff',
                                anchor: config.type === 'bar' ? 'end' : 'center',
                                align: config.type === 'bar' ? 'top' : 'center',
                                font: { size: 10, weight: 'bold' },
                                formatter: (val) => val >= 1000 ? (val/1000).toFixed(1) + 'k' : val.toFixed(0),
                                display: (ctx) => ctx.dataset.data[ctx.dataIndex] !== 0
                            }
                        },
                        scales: config.type !== 'pie' ? {
                            y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10, weight: '600' } } },
                            x: { grid: { display: false }, ticks: { font: { size: 10, weight: '600' } } }
                        } : {}
                    }
                });
            }, [data, config, filters]);

            // Função de Partilha/Download corrigida
            const handleShare = async (item) => {
                if (!item || !item.rows) return;
                
                setLoading(true);
                try {
                    const ws = XLSX.utils.json_to_sheet(item.rows);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Dados_Extraidos");
                    
                    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const filename = `BI_${item.label.replace(/\s/g, '_')}.xlsx`;
                    const file = new File([blob], filename, { type: blob.type });

                    // Tenta partilhar se o navegador suportar ficheiros
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: `Exportação: ${item.label}`,
                                text: 'Dados gerados pelo BI do MAPA.'
                            });
                        } catch (shareError) {
                            console.warn("Partilha nativa falhou, a usar download...", shareError);
                            triggerDownload(blob, filename);
                        }
                    } else {
                        triggerDownload(blob, filename);
                    }
                } catch (err) {
                    console.error("Erro na exportação:", err);
                    alert("Ocorreu um erro ao gerar a planilha.");
                } finally {
                    setLoading(false);
                }
            };

            const triggerDownload = (blob, filename) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            };

            return (
                <div className="flex h-screen w-screen bg-slate-50 overflow-hidden">
                    
                    {/* Sidebar Lateral */}
                    <aside className={`sidebar-transition fixed lg:static z-40 h-full bg-white border-r shadow-2xl lg:shadow-none flex flex-col ${sidebarOpen ? 'w-72 translate-x-0' : 'w-0 -translate-x-full lg:translate-x-0 lg:w-0 overflow-hidden'}`}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50/50">
                            <h2 className="font-black text-xs uppercase tracking-[0.2em] text-slate-400">Painel de Controle</h2>
                            <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-slate-400 font-bold">×</button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-6">
                            {data.length > 0 && (
                                <>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Dimensão (X)</label>
                                        <select value={config.xAxis} onChange={e => setConfig({...config, xAxis: e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold border-0 focus:ring-2 focus:ring-indigo-500">
                                            {columns.map(c => <option key={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Métrica (Y)</label>
                                        <select value={config.yAxis} onChange={e => setConfig({...config, yAxis: e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold border-0 focus:ring-2 focus:ring-indigo-500">
                                            {columns.map(c => <option key={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Cálculo</label>
                                        <select value={config.agg} onChange={e => setConfig({...config, agg: e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold border-0 focus:ring-2 focus:ring-indigo-500">
                                            <option value="sum">Soma Total</option>
                                            <option value="avg">Média</option>
                                            <option value="count">Contagem</option>
                                        </select>
                                    </div>
                                    <button onClick={() => setModal({open: true, step: 1, field: null})} className="w-full py-4 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                                        Configurar Filtros
                                    </button>
                                </>
                            )}
                            {data.length === 0 && <p className="text-xs text-slate-300 font-medium text-center py-10 italic">Importe dados para ativar os controles.</p>}
                        </div>

                        <div className="p-6 border-t bg-slate-50/50">
                            <p className="text-[8px] font-black text-slate-300 uppercase text-center tracking-widest">BI Pro v2.7 Mobile-First</p>
                        </div>
                    </aside>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 flex flex-col min-w-0 relative h-full">
                        
                        {/* Header */}
                        <header className="bg-white/80 backdrop-blur-md p-4 flex justify-between items-center border-b sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 bg-slate-100 rounded-xl text-slate-600 active:scale-90 transition-all">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                                </button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black italic text-xs">BI</div>
                                    <h1 className="font-extrabold text-slate-800 text-sm tracking-tighter">MAPA</h1>
                                </div>
                            </div>
                            <label className="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase cursor-pointer active:scale-95 shadow-lg">
                                Importar
                                <input type="file" className="hidden" accept=".xlsx,.csv" onChange={onUpload} />
                            </label>
                        </header>

                        <div className="flex-1 p-4 lg:p-8 overflow-hidden flex flex-col gap-4">
                            
                            {/* Filtros Ativos com Visualização das Informações Selecionadas */}
                            {filters.length > 0 && (
                                <div className="flex items-center justify-between bg-white p-2 rounded-2xl border shadow-sm px-4">
                                    <div className="flex flex-wrap gap-2">
                                        {filters.map((f, idx) => (
                                            <div key={idx} className="bg-indigo-50 border border-indigo-100 px-3 py-1 rounded-xl flex items-center gap-2 max-w-[220px]">
                                                <div className="flex items-center gap-1 min-w-0">
                                                    <span className="text-[8px] font-black text-indigo-400 uppercase shrink-0">{f.field}:</span>
                                                    <span className="text-[9px] font-bold text-indigo-700 truncate">
                                                        {f.vals.length > 3 ? `${f.vals.length} itens` : f.vals.join(', ')}
                                                    </span>
                                                </div>
                                                <button onClick={() => setFilters(filters.filter((_, i) => i !== idx))} className="text-indigo-600 font-bold ml-1">×</button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setFilters([])} className="text-[9px] font-black text-red-500 uppercase bg-red-50 px-3 py-1.5 rounded-lg ml-4 shrink-0">Limpar Tudo</button>
                                </div>
                            )}

                            {/* Área do Gráfico */}
                            <div className="flex-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-6 lg:p-10 relative flex flex-col">
                                {data.length === 0 ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center opacity-40">
                                        <div className="text-6xl mb-4">📂</div>
                                        <p className="font-bold text-slate-400 uppercase text-xs tracking-widest">Aguardando Ficheiro Excel</p>
                                    </div>
                                ) : (
                                    <>
                                        <div className="flex justify-end gap-2 mb-6">
                                            {['bar', 'line', 'pie'].map(t => (
                                                <button key={t} onClick={() => setConfig({...config, type: t})} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all ${config.type === t ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-50 text-slate-400'}`}>{t}</button>
                                            ))}
                                        </div>
                                        <div className="flex-1">
                                            <canvas ref={canvasRef}></canvas>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Modais (Filtro e DrillDown) */}
                    {modal.open && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[60] flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8 text-slate-800">
                                    <h3 className="font-black text-2xl">{modal.step === 1 ? 'Campo' : 'Itens'}</h3>
                                    <button onClick={() => setModal({open: false})} className="w-10 h-10 bg-slate-100 rounded-full font-bold">×</button>
                                </div>
                                {modal.step === 2 && (
                                    <div className="flex gap-2 mb-4">
                                        <button onClick={() => setTempFilters([...new Set(data.map(d => String(d[modal.field])))])} className="flex-1 py-2 bg-slate-100 rounded-xl text-[8px] font-black uppercase">Tudo</button>
                                        <button onClick={() => setTempFilters([])} className="flex-1 py-2 bg-red-50 text-red-500 rounded-xl text-[8px] font-black uppercase">Limpar</button>
                                    </div>
                                )}
                                <div className="max-h-[40vh] overflow-y-auto space-y-2 pr-2">
                                    {modal.step === 1 ? columns.map(c => (
                                        <button key={c} onClick={() => {setModal({open: true, step: 2, field: c}); setTempFilters([]);}} className="w-full text-left p-5 bg-slate-50 rounded-2xl font-black text-slate-600 flex justify-between">
                                            {c} <span>→</span>
                                        </button>
                                    )) : [...new Set(data.map(d => String(d[modal.field])))].sort().map(v => (
                                        <button key={v} onClick={() => tempFilters.includes(v) ? setTempFilters(tempFilters.filter(x => x !== v)) : setTempFilters([...tempFilters, v])} className={`w-full text-left p-4 rounded-2xl font-black flex justify-between ${tempFilters.includes(v) ? 'bg-indigo-600 text-white shadow-xl' : 'bg-slate-50 text-slate-400'}`}>
                                            {v || "(Vazio)"} {tempFilters.includes(v) && <span>✓</span>}
                                        </button>
                                    ))}
                                </div>
                                {modal.step === 2 && (
                                    <div className="mt-8 flex gap-4">
                                        <button onClick={() => setModal({open: true, step: 1, field: null})} className="flex-1 py-5 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Voltar</button>
                                        <button onClick={() => { setFilters([...filters.filter(f => f.field !== modal.field), {field: modal.field, vals: tempFilters}]); setModal({open: false}); }} className="flex-[2] bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl uppercase text-[10px]">Aplicar</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {drillDown && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-2xl rounded-t-[3rem] sm:rounded-[3rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl">
                                <div className="p-8 bg-slate-900 text-white flex justify-between items-center">
                                    <div><p className="text-[10px] font-black uppercase text-indigo-400 tracking-widest mb-1">Detalhes Selecionados</p><h4 className="font-black text-2xl">{drillDown.label}</h4></div>
                                    <button onClick={() => setDrillDown(null)} className="w-12 h-12 bg-white/10 rounded-full font-bold">×</button>
                                </div>
                                <div className="flex-1 overflow-auto p-6 bg-slate-50">
                                    <div className="bg-white rounded-2xl border overflow-hidden">
                                        <table className="w-full text-[10px] text-left">
                                            <thead className="bg-slate-50 border-b">
                                                <tr>{columns.slice(0, 5).map(c => <th key={c} className="p-4 text-slate-400 font-black uppercase tracking-tighter">{c}</th>)}</tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {drillDown.rows.slice(0, 20).map((r, i) => (
                                                    <tr key={i} className="hover:bg-indigo-50/10">
                                                        {columns.slice(0, 5).map(c => <td key={c} className="p-4 text-slate-600 font-medium whitespace-nowrap">{String(r[c])}</td>)}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {drillDown.rows.length > 20 && <p className="text-center py-4 text-[9px] text-slate-300 font-bold uppercase tracking-widest">Visualizando os primeiros 20 registos</p>}
                                </div>
                                <div className="p-8 border-t bg-white">
                                    <button onClick={() => handleShare(drillDown)} className="w-full py-5 bg-[#25D366] text-white rounded-3xl font-black shadow-xl flex items-center justify-center gap-3 uppercase text-xs tracking-widest active:scale-[0.98] transition-all">
                                        Gerar Planilha e Partilhar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] flex flex-col items-center justify-center">
                            <div className="w-16 h-16 border-[6px] border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-6 font-black text-indigo-600 text-[10px] tracking-widest uppercase animate-pulse">Processando Exportação</p>
                        </div>
                    )}
                </div>
            );
        }

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
